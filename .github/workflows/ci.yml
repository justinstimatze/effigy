name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[discovery]" pytest

      - name: Test
        run: python -m pytest effigy/tests/ -v --tb=short

      - name: Compile fixture
        run: python -m effigy compile effigy/tests/fixtures/test_npc.effigy

      - name: Import check
        run: python -c "from effigy import parse, CharacterAST, NarrativeRole; print('OK')"
